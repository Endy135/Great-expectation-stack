#version: "3.9"

services:

  # ── Great Expectations + PySpark API ──────────────────────────────────────
  ge-api:
    build:
      context: ./ge_runner
      dockerfile: Dockerfile
    container_name: ge-api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data:ro
      - ge-results:/app/ge_results
      - ge-project:/app/ge_project
    environment:
      - PYTHONUNBUFFERED=1
      - JAVA_TOOL_OPTIONS=-Xmx2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/data/preview"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - ge-net

  # ── Static Frontend served by Nginx ───────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: ge-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ge-api
    networks:
      - ge-net
    restart: unless-stopped

volumes:
  ge-results:
  ge-project:

networks:
  ge-net:
    driver: bridge
